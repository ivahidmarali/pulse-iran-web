# /etc/nginx/sites-available/palsiran
# Cloudflare handles SSL termination — nginx only needs HTTP.
# Security headers are set by Next.js (next.config.mjs -> headers()).
# Do NOT add them here — duplicates intersect with Cloudflare and
# drop telegram.org / api.indexnow.org from the effective CSP.
#
# Deploy: this file is written to the server by .github/workflows/deploy.yml.
# Do NOT manually edit /etc/nginx/sites-available/palsiran on the server —
# it will be overwritten on the next deploy.

# www -> canonical non-www
server {
    listen 80;
    server_name www.palsiran.com;
    return 301 https://palsiran.com$request_uri;
}

server {
    listen 80;
    server_name palsiran.com;

    # Redirect plain HTTP to HTTPS. Cloudflare terminates SSL and forwards to port 80,
    # setting X-Forwarded-Proto to the protocol the user actually used. When that's
    # "http" (user hit http://palsiran.com), send a 301 so browsers and Googlebot
    # upgrade to https:// — this closes the GSC http/https canonicalization split.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass       http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://localhost:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
