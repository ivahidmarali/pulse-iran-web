# /etc/nginx/sites-available/palsiran.com
# symlink: ln -s /etc/nginx/sites-available/palsiran.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name palsiran.com www.palsiran.com;

    # Redirect www to non-www (before HTTPS redirect)
    if ($host = www.palsiran.com) {
        return 301 https://palsiran.com$request_uri;
    }

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.palsiran.com;

    ssl_certificate     /etc/letsencrypt/live/palsiran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/palsiran.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://palsiran.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name palsiran.com;

    ssl_certificate     /etc/letsencrypt/live/palsiran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/palsiran.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers are set by Next.js (next.config.mjs -> headers()).
    # Do NOT add them here too — duplicates cause Cloudflare CSP intersection
    # to drop telegram.org / api.indexnow.org and break embeds + IndexNow.

    # Proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=0, s-maxage=60, stale-while-revalidate=120" always;
    }

    # Proxy /api/* to FastAPI (strip the /api prefix)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
