name: Deploy Pulse Iran Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (validate before deploying)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/pulse-iran-web
            git pull origin main
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.local
            echo "INTERNAL_API_URL=http://127.0.0.1:8000" >> .env.local
            npm ci --silent
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} npm run build
            pm2 reload pulse-iran-web --update-env || pm2 start npm --name pulse-iran-web -- start
            pm2 save

      - name: Health check
        run: |
          sleep 5
          curl -sf --max-time 10 http://${{ secrets.DEPLOY_HOST }} -o /dev/null

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_LOG_CHANNEL_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Web deployed successfully*%0Acommit: \`$(echo $GITHUB_SHA | cut -c1-7)\`%0Abranch: \`main\`"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_LOG_CHANNEL_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Web deploy FAILED*%0Acommit: \`$(echo $GITHUB_SHA | cut -c1-7)\`%0A[View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
