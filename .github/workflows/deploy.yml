name: Deploy Pulse Iran Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (validate before deploying)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEXT_PUBLIC_API_URL,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION
          script: |
            set -e
            cd ~/pulse-iran-web
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e .env.local -e node_modules

            # Write env vars
            printf "NEXT_PUBLIC_API_URL=%s\nNEXT_PUBLIC_SITE_URL=%s\nINTERNAL_API_URL=http://127.0.0.1:8000\nNEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=%s\n" \
              "$NEXT_PUBLIC_API_URL" "$NEXT_PUBLIC_SITE_URL" "$NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION" > .env.local

            npm ci --silent
            NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION="$NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION" npm run build
            NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION="$NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION" pm2 reload pulse-iran-web --update-env || NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION="$NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION" pm2 start npm --name pulse-iran-web -- start
            pm2 save

            # Nginx config (Cloudflare handles SSL — server only needs HTTP).
            # Security headers are set by Next.js (next.config.mjs -> headers()).
            # Do NOT add them here too — duplicates intersect with Cloudflare and
            # drop telegram.org / api.indexnow.org from the effective CSP.
            cat > /etc/nginx/sites-available/palsiran << 'NGINX'
            # www -> canonical non-www (Cloudflare handles SSL termination;
            # this redirect fires for any request nginx sees with Host: www.*)
            server {
                listen 80;
                server_name www.palsiran.com;
                return 301 https://palsiran.com$request_uri;
            }

            server {
                listen 80;
                server_name palsiran.com;

                location / {
                    proxy_pass         http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }

                location /api/ {
                    proxy_pass       http://localhost:8000/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /_next/static/ {
                    proxy_pass http://localhost:3000/_next/static/;
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/palsiran /etc/nginx/sites-enabled/palsiran
            rm -f /etc/nginx/sites-enabled/palsiran.com /etc/nginx/sites-enabled/pulse-iran 2>/dev/null || true
            # Reload nginx: try systemd first, fall back to direct signal
            # (works regardless of how nginx is supervised). Validates config
            # first; aborts if syntax is bad.
            nginx -t && (systemctl reload nginx 2>/dev/null || nginx -s reload 2>/dev/null || true)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}

      - name: Health check
        run: |
          sleep 5
          curl -sf --max-time 15 https://palsiran.com -o /dev/null || \
          curl -sf --max-time 15 http://${{ secrets.DEPLOY_HOST }} -o /dev/null

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_LOG_CHANNEL_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Web deployed successfully*%0Acommit: \`$(echo $GITHUB_SHA | cut -c1-7)\`%0Abranch: \`main\`"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_LOG_CHANNEL_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Web deploy FAILED*%0Acommit: \`$(echo $GITHUB_SHA | cut -c1-7)\`%0A[View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
