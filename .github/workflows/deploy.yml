name: Deploy Pulse Iran Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Build (validate before deploying)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEXT_PUBLIC_API_URL,NEXT_PUBLIC_SITE_URL
          script: |
            set -e
            cd ~/pulse-iran-web
            git checkout -- .
            git clean -fd -e .env.local -e node_modules
            git pull origin main

            # Write env vars
            printf "NEXT_PUBLIC_API_URL=%s\nNEXT_PUBLIC_SITE_URL=%s\nINTERNAL_API_URL=http://127.0.0.1:8000\n" \
              "$NEXT_PUBLIC_API_URL" "$NEXT_PUBLIC_SITE_URL" > .env.local

            npm ci --silent
            NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" npm run build
            pm2 reload pulse-iran-web --update-env || pm2 start npm --name pulse-iran-web -- start
            pm2 save

            # Nginx config (Cloudflare handles SSL — server only needs HTTP)
            cat > /etc/nginx/sites-available/palsiran << 'NGINX'
            server {
                listen 80;
                server_name palsiran.com www.palsiran.com;

                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
                add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
                add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; frame-src https://t.me;" always;

                location / {
                    proxy_pass         http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }

                location /api/ {
                    proxy_pass       http://localhost:8000/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /_next/static/ {
                    proxy_pass http://localhost:3000/_next/static/;
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/palsiran /etc/nginx/sites-enabled/palsiran
            rm -f /etc/nginx/sites-enabled/palsiran.com /etc/nginx/sites-enabled/pulse-iran 2>/dev/null || true
            nginx -t && systemctl reload nginx
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Health check
        run: |
          sleep 5
          curl -sf --max-time 15 https://palsiran.com -o /dev/null || \
          curl -sf --max-time 15 http://${{ secrets.DEPLOY_HOST }} -o /dev/null

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_LOG_CHANNEL_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Web deployed successfully*%0Acommit: \`$(echo $GITHUB_SHA | cut -c1-7)\`%0Abranch: \`main\`"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_LOG_CHANNEL_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Web deploy FAILED*%0Acommit: \`$(echo $GITHUB_SHA | cut -c1-7)\`%0A[View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
